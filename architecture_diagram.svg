<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="520" fill="#0a0f1a" rx="16"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">SYSTEM ARCHITECTURE</text>

  <!-- Frontend Box -->
  <rect x="200" y="55" width="400" height="80" rx="12" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" fill="#22c55e" font-size="15" font-weight="800">REACT 18 FRONTEND</text>
  <text x="400" y="102" text-anchor="middle" fill="#94a3b8" font-size="11">Vercel CDN · HTTPS · Global Edge Network</text>
  <text x="400" y="120" text-anchor="middle" fill="#64748b" font-size="10">Side Panel Navigation │ 7 Feature UIs │ User Switcher │ P2P Chat</text>

  <!-- Arrow Frontend → Server -->
  <line x1="400" y1="135" x2="400" y2="170" stroke="#22c55e" stroke-width="2"/>
  <polygon points="395,168 405,168 400,175" fill="#22c55e"/>
  <text x="470" y="157" fill="#64748b" font-size="10">HTTPS /api/* proxy</text>

  <!-- Server Box -->
  <rect x="220" y="178" width="360" height="90" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" fill="#3b82f6" font-size="15" font-weight="800">FastAPI Server</text>
  <text x="400" y="225" text-anchor="middle" fill="#94a3b8" font-size="11">AWS EC2 (Docker) · Python 3.11 · 28 API Endpoints</text>
  <text x="400" y="245" text-anchor="middle" fill="#64748b" font-size="10">Lifecycle │ Vision │ Recommendations │ Credits │ P2P │ Cart │ Dashboard</text>
  <text x="400" y="260" text-anchor="middle" fill="#64748b" font-size="10">ML Models: GradientBoosting + RandomForest (in-memory)</text>

  <!-- Three arrows from server -->
  <line x1="300" y1="268" x2="160" y2="320" stroke="#8b5cf6" stroke-width="1.5"/>
  <polygon points="156,317 164,317 160,324" fill="#8b5cf6"/>

  <line x1="400" y1="268" x2="400" y2="320" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="395,318 405,318 400,325" fill="#f59e0b"/>

  <line x1="500" y1="268" x2="640" y2="320" stroke="#14b8a6" stroke-width="1.5"/>
  <polygon points="636,317 644,317 640,324" fill="#14b8a6"/>

  <!-- MongoDB Box -->
  <rect x="60" y="328" width="200" height="80" rx="12" fill="#111827" stroke="#8b5cf6" stroke-width="2"/>
  <text x="160" y="355" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="800">MongoDB Atlas</text>
  <text x="160" y="375" text-anchor="middle" fill="#94a3b8" font-size="11">Free M0 Cluster</text>
  <text x="160" y="393" text-anchor="middle" fill="#64748b" font-size="10">200 Users · 1000 Orders · P2P Chat</text>

  <!-- Gemini 2.5 Box -->
  <rect x="290" y="328" width="220" height="80" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="355" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="800">Gemini 2.5 Flash</text>
  <text x="400" y="375" text-anchor="middle" fill="#94a3b8" font-size="11">Computer Vision Grading</text>
  <text x="400" y="393" text-anchor="middle" fill="#64748b" font-size="10">Image → Grade A/B/C/D + Damage Detection</text>

  <!-- Gemini 3.1 Box -->
  <rect x="540" y="328" width="210" height="80" rx="12" fill="#111827" stroke="#14b8a6" stroke-width="2"/>
  <text x="645" y="355" text-anchor="middle" fill="#14b8a6" font-size="14" font-weight="800">Gemini 3.1 Flash</text>
  <text x="645" y="375" text-anchor="middle" fill="#94a3b8" font-size="11">Lifecycle Decision Engine</text>
  <text x="645" y="393" text-anchor="middle" fill="#64748b" font-size="10">9 Params → 5 Decisions + Reasoning</text>

  <!-- Bottom: Features connected -->
  <rect x="60" y="440" width="690" height="60" rx="12" fill="#1a2235" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="400" y="465" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">7 INTERCONNECTED FEATURES</text>
  <text x="400" y="485" text-anchor="middle" fill="#64748b" font-size="11">🤖 Lifecycle · 👁️ Vision · ♻️ Refurbished · 🌿 Credits · 🤝 P2P · ⚠️ Return Risk · 📊 Dashboard</text>

  <!-- Dotted connection lines from services to features -->
  <line x1="160" y1="408" x2="160" y2="440" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="408" x2="400" y2="440" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="645" y1="408" x2="645" y2="440" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
