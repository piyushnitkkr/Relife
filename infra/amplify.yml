version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Single-page app — no build step (vanilla HTML + React CDN)"
    build:
      commands:
        - echo "Copying index.html to build output"
        - mkdir -p dist
        - cp index.html dist/
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths: []

  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Cache-Control'
          value: 'public, max-age=3600'
        - key: 'X-Frame-Options'
          value: 'DENY'
        - key: 'X-Content-Type-Options'
          value: 'nosniff'
