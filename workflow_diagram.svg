<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#0a0f1a" rx="16"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#22c55e" font-size="22" font-weight="800">♻️ ReLife AI — User Journey</text>
  
  <!-- Step 1 -->
  <rect x="30" y="70" width="260" height="180" rx="14" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="100" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700">STEP 1: SHOP SMARTER</text>
  <text x="50" y="130" fill="#f1f5f9" font-size="12">🛒 Browse refurbished products</text>
  <text x="50" y="155" fill="#f1f5f9" font-size="12">📊 See Health Score (0-100)</text>
  <text x="50" y="180" fill="#f1f5f9" font-size="12">⚠️ Return risk warning at cart</text>
  <text x="50" y="205" fill="#f1f5f9" font-size="12">🤝 Find P2P sellers nearby</text>
  <text x="50" y="235" fill="#94a3b8" font-size="11" font-style="italic">AI prevents bad purchases</text>
  
  <!-- Arrow 1→2 -->
  <path d="M 295 160 L 330 160" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2 -->
  <rect x="335" y="70" width="260" height="180" rx="14" fill="#111827" stroke="#3b82f6" stroke-width="2"/>
  <text x="465" y="100" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="700">STEP 2: AI DECIDES</text>
  <text x="355" y="130" fill="#f1f5f9" font-size="12">📸 Upload product photos</text>
  <text x="355" y="155" fill="#f1f5f9" font-size="12">👁️ Gemini grades condition A/B/C/D</text>
  <text x="355" y="180" fill="#f1f5f9" font-size="12">🤖 Gemini 3.1 decides fate (9 factors)</text>
  <text x="355" y="205" fill="#f1f5f9" font-size="12">💬 P2P chat with matched sellers</text>
  <text x="355" y="235" fill="#94a3b8" font-size="11" font-style="italic">Multi-model AI reasoning</text>
  
  <!-- Arrow 2→3 -->
  <path d="M 600 160 L 635 160" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/>
  
  <!-- Step 3 -->
  <rect x="640" y="70" width="230" height="180" rx="14" fill="#111827" stroke="#8b5cf6" stroke-width="2"/>
  <text x="755" y="100" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="700">STEP 3: EARN &amp; IMPACT</text>
  <text x="660" y="130" fill="#f1f5f9" font-size="12">🌿 Earn Green Credits</text>
  <text x="660" y="155" fill="#f1f5f9" font-size="12">🎁 Redeem for ₹ coupons</text>
  <text x="660" y="180" fill="#f1f5f9" font-size="12">🌍 Track CO₂ saved</text>
  <text x="660" y="205" fill="#f1f5f9" font-size="12">🌳 Trees equivalent</text>
  <text x="660" y="235" fill="#94a3b8" font-size="11" font-style="italic">Gamified sustainability</text>
  
  <!-- AI Engine Section -->
  <rect x="30" y="280" width="840" height="190" rx="14" fill="#1a2235" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="450" y="310" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="700">⚡ AI ENGINE LAYER</text>
  
  <!-- AI Boxes -->
  <rect x="50" y="330" width="150" height="60" rx="8" fill="#0a0f1a" stroke="#22c55e" stroke-width="1"/>
  <text x="125" y="355" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">Gemini 2.5 Flash</text>
  <text x="125" y="375" text-anchor="middle" fill="#94a3b8" font-size="10">Vision Grading</text>
  
  <rect x="220" y="330" width="150" height="60" rx="8" fill="#0a0f1a" stroke="#3b82f6" stroke-width="1"/>
  <text x="295" y="355" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="700">Gemini 3.1 Flash</text>
  <text x="295" y="375" text-anchor="middle" fill="#94a3b8" font-size="10">Lifecycle Decisions</text>
  
  <rect x="390" y="330" width="150" height="60" rx="8" fill="#0a0f1a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="465" y="355" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="700">Random Forest</text>
  <text x="465" y="375" text-anchor="middle" fill="#94a3b8" font-size="10">Return Prediction</text>
  
  <rect x="560" y="330" width="150" height="60" rx="8" fill="#0a0f1a" stroke="#14b8a6" stroke-width="1"/>
  <text x="635" y="355" text-anchor="middle" fill="#14b8a6" font-size="11" font-weight="700">Health Score Algo</text>
  <text x="635" y="375" text-anchor="middle" fill="#94a3b8" font-size="10">Trust Scoring</text>
  
  <rect x="730" y="330" width="120" height="60" rx="8" fill="#0a0f1a" stroke="#f59e0b" stroke-width="1"/>
  <text x="790" y="355" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">P2P Ranker</text>
  <text x="790" y="375" text-anchor="middle" fill="#94a3b8" font-size="10">Seller Matching</text>
  
  <!-- Data Layer -->
  <rect x="50" y="410" width="200" height="45" rx="8" fill="#0a0f1a" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="150" y="437" text-anchor="middle" fill="#94a3b8" font-size="11">MongoDB Atlas (200 users)</text>
  
  <rect x="270" y="410" width="200" height="45" rx="8" fill="#0a0f1a" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="370" y="437" text-anchor="middle" fill="#94a3b8" font-size="11">AWS EC2 (FastAPI Docker)</text>
  
  <rect x="490" y="410" width="200" height="45" rx="8" fill="#0a0f1a" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="590" y="437" text-anchor="middle" fill="#94a3b8" font-size="11">Vercel CDN (React Frontend)</text>
  
  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
