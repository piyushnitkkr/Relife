version: '3.8'

# For local testing of the Lambda function
services:
  vision-lambda:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9001:8080"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
