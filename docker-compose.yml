version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - PORT=8000
      - AWS_REGION=us-east-1
      - MONGO_URI=${MONGO_URI:-}
      - DYNAMO_TABLE_NAME=${DYNAMO_TABLE_NAME:-relife-user-credits}
      - S3_BUCKET=${S3_BUCKET:-relife-ai-assets}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-}
      - COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID:-}
      - SNS_TOPIC_ARN=${SNS_TOPIC_ARN:-}
      - FRONTEND_URL=${FRONTEND_URL:-*}
      - DEBUG=false
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
