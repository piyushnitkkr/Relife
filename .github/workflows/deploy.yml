name: Deploy Server to EC2

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'frontend/index.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Relife
            git pull
            cp frontend/index.html server/static/index.html
            cd server
            docker stop relife || true
            docker rm relife || true
            docker build -t relife-server .
            docker run -d --name relife -p 8000:8000 --restart always relife-server
